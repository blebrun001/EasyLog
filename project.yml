# XcodeGen project definition mirroring the Swift Package modules.
# Keep this file as the single source of truth for Xcode project regeneration.
name: EasyLog
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 26.0
targets:
  EasyLogKit:
    type: framework
    platform: macOS
    sources:
      - Sources/EasyLogKit/App
      - Sources/EasyLogKit/Core
      - Sources/EasyLogKit/Features
      - Sources/EasyLogKit/Infrastructure
      - path: Sources/EasyLogKit/Resources/USGS/11A02/pdf
        buildPhase: resources
        type: folder
      - path: Sources/EasyLogKit/Resources/isolated
        buildPhase: resources
        type: folder
      - path: Sources/EasyLogKit/Resources/USGSRuntime
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iphes.easylogkit
        GENERATE_INFOPLIST_FILE: YES

  EasyLogApp:
    type: application
    platform: macOS
    sources:
      - Sources/EasyLogApp
    resources:
      - Sources/EasyLogApp/Resources/Assets.xcassets
      - Sources/EasyLogApp/Resources/EasyLog.icns
    dependencies:
      - target: EasyLogKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iphes.easylogapp
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 1.1.2
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_NAME: EasyLogApp
        SWIFT_EMIT_LOC_STRINGS: NO

  EasyLogKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/EasyLogKitTests
    dependencies:
      - target: EasyLogKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.iphes.easylogkit.tests

schemes:
  EasyLogApp:
    build:
      targets:
        EasyLogKit: all
        EasyLogApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EasyLogKitTests
