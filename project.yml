# XcodeGen project definition mirroring the Swift Package modules.
# Keep this file as the single source of truth for Xcode project regeneration.
name: Cake
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 26.0
targets:
  CakeKit:
    type: framework
    platform: macOS
    sources:
      - Sources/CakeKit/App
      - Sources/CakeKit/Core
      - Sources/CakeKit/Features
      - Sources/CakeKit/Infrastructure
      - path: Sources/CakeKit/Resources/USGS/11A02/pdf
        buildPhase: resources
        type: folder
      - path: Sources/CakeKit/Resources/isolated
        buildPhase: resources
        type: folder
      - path: Sources/CakeKit/Resources/USGSRuntime
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iphes.cakekit
        GENERATE_INFOPLIST_FILE: YES

  CakeApp:
    type: application
    platform: macOS
    sources:
      - Sources/CakeApp
    resources:
      - Sources/CakeApp/Resources/Assets.xcassets
      - Sources/CakeApp/Resources/Cake.icns
    dependencies:
      - target: CakeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iphes.cakeapp
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: CakeApp
        SWIFT_EMIT_LOC_STRINGS: NO

  CakeKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/CakeKitTests
    dependencies:
      - target: CakeKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.iphes.cakekit.tests

schemes:
  CakeApp:
    build:
      targets:
        CakeKit: all
        CakeApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CakeKitTests
