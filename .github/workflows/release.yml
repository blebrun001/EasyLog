name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (example: v1.2.3). If empty, a manual tag is generated."
        required: false
        type: string

permissions:
  contents: write

jobs:
  macos-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.release_tag || '' }}" ]]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          else
            RELEASE_TAG="v0.0.0-manual-${GITHUB_RUN_NUMBER}"
          fi

          SAFE_TAG="$(echo "${RELEASE_TAG}" | tr '/' '-')"
          DMG_FILE="CakeApp-${SAFE_TAG}-unsigned.dmg"

          {
            echo "release_tag=${RELEASE_TAG}"
            echo "safe_tag=${SAFE_TAG}"
            echo "dmg_file=${DMG_FILE}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build release resource catalog
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build-resources.sh release

      - name: Build app (unsigned)
        shell: bash
        run: |
          set -euo pipefail
          DERIVED_DATA="${RUNNER_TEMP}/DerivedData"

          xcodebuild \
            -project Cake.xcodeproj \
            -scheme CakeApp \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -derivedDataPath "${DERIVED_DATA}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

          APP_PATH="${DERIVED_DATA}/Build/Products/Release/CakeApp.app"
          if [[ ! -d "${APP_PATH}" ]]; then
            echo "Expected app bundle not found at ${APP_PATH}" >&2
            exit 1
          fi

          echo "APP_PATH=${APP_PATH}" >> "${GITHUB_ENV}"

      - name: Package unsigned DMG + checksum
        shell: bash
        run: |
          set -euo pipefail

          DIST_DIR="${GITHUB_WORKSPACE}/dist"
          STAGING_DIR="${RUNNER_TEMP}/dmg-staging"
          DMG_FILE="${{ steps.meta.outputs.dmg_file }}"
          DMG_PATH="${DIST_DIR}/${DMG_FILE}"

          rm -rf "${STAGING_DIR}" "${DIST_DIR}"
          mkdir -p "${STAGING_DIR}" "${DIST_DIR}"

          cp -R "${APP_PATH}" "${STAGING_DIR}/"
          ln -s /Applications "${STAGING_DIR}/Applications"

          hdiutil create \
            -volname "CakeApp" \
            -srcfolder "${STAGING_DIR}" \
            -ov \
            -format UDZO \
            "${DMG_PATH}"

          (
            cd "${DIST_DIR}"
            shasum -a 256 "${DMG_FILE}" > "${DMG_FILE}.sha256"
          )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ steps.meta.outputs.safe_tag }}
          path: |
            dist/*.dmg
            dist/*.dmg.sha256
          if-no-files-found: error

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_tag }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.dmg.sha256
