name: Sync App Version From Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to apply (for example v1.2.3)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync-version:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            tag="${{ github.event.inputs.tag }}"
          elif [[ -n "${{ github.event.release.tag_name }}" ]]; then
            tag="${{ github.event.release.tag_name }}"
          else
            echo "No release tag available from event payload." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Using tag: $tag"

      - name: Sync MARKETING_VERSION from tag
        shell: bash
        run: |
          ./scripts/sync_marketing_version_from_tag.sh "${{ steps.tag.outputs.tag }}"

      - name: Commit and push changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          target_branch="${{ github.event.release.target_commitish || github.event.repository.default_branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add project.yml EasyLog.xcodeproj/project.pbxproj
          git commit -m "chore(version): sync app version to ${{ steps.tag.outputs.tag }}"
          git push origin "HEAD:${target_branch}"
