name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build resource catalogs
        run: ./scripts/build-resources.sh all

      - name: Enforce large-file policy
        run: ./scripts/check-large-assets.sh

      - name: Test
        run: make test
